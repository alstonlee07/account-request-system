spring:
  application:
    name: account-request-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/account_request_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080